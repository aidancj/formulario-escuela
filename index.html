<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Escolar</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="form-container">
        <img id="logo" src="logoUNID.png" alt="LOGO UNID">
        <h2>Formulario</h2>
        <form id="whatsappForm">

            
            <label for="name">Nombre del Alumno:</label>
            <input type="text" id="name" required>

            <label for="issue">Asunto o Trámite:</label>
            <input type="text" id="issue" required>

            <button type="submit">Enviar a WhatsApp</button>
        </form>
    </div>

    <script src="whatsApp.js"></script>
</body>
</html>
